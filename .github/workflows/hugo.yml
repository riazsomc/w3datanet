name: Build and Publish Hugo Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Ensures themes in submodules are pulled
          fetch-depth: 0         # Useful for Hugo's .Lastmod feature

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest' # You can change 'latest' to a specific version like '0.123.0'
          extended: true         # Enables SCSS/SASS support which most themes need

      - name: Build Site
        run: hugo --gc --minify  # Cleans up unused cache and minifies files for speed
      - name: Debug Title Output
        run: |
          echo "=== Homepage title ==="
          grep -o '<title>[^<]*</title>' public/index.html
          echo "=== Profile title ==="
          grep -o '<title>[^<]*</title>' public/profile/index.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
