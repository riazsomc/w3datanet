<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/style.css?v={{ now.Unix }}">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon-48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/icons/favicon-128.png">
    <link rel="icon" type="image/png" sizes="256x256" href="/icons/favicon-256.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "@id": "https://w3datanet.com/#person",
      "name": "Dr. B. M. Riazul Islam",
      "url": "https://w3datanet.com/",
      "image": "https://w3datanet.com/images/profile.jpg",
      "jobTitle": "Physician & Digital Health Systems Architect",
      "hasOccupation": {
        "@type": "Occupation",
        "name": "Physician",
        "occupationLocation": {
          "@type": "Country",
          "name": "Bangladesh"
        },
        "skills": [
          "Digital Health Systems",
          "Health Information Systems",
          "Health Data Interoperability",
          "ICD-11 Implementation",
          "Information Architecture",
          "AI Architecture",
          "Retrieval-Augmented Generation",
          "Secure Infrastructure Design"
        ]
      },
      "affiliation": {
        "@type": "GovernmentOrganization",
        "name": "Ministry of Health and Family Welfare",
        "url": "https://mohfw.gov.bd/"
      },
      "sameAs": [
        "https://linkedin.com/in/riazsomc44",
        "https://github.com/riazsomc"
      ],
      "knowsAbout": [
        "Digital Health",
        "Health Information Systems",
        "Health Data Interoperability",
        "ICD-11 Implementation",
        "AI Architecture",
        "Retrieval-Augmented Generation",
        "Information Architecture",
        "Secure Infrastructure",
        "Health Data Governance"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://w3datanet.com/#organization",
      "name": "W3DataNet",
      "url": "https://w3datanet.com/",
      "logo": "https://w3datanet.com/images/logo.png",
      "founder": { "@id": "https://w3datanet.com/#person" },
      "sameAs": [
        "https://linkedin.com/in/riazsomc44",
        "https://github.com/riazsomc"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ .Site.BaseURL }}"
        }
        {{ if ne .RelPermalink "/" }}
        ,
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ .Title }}",
          "item": "{{ .Permalink }}"
        }
        {{ end }}
      ]
    }
    </script>
    <link rel="canonical" href="{{ .Permalink }}">
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="og:title" content="{{ .Title }} | {{ .Site.Title }}">
    <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:site_name" content="{{ .Site.Title }}">
    <meta property="og:image" content="https://w3datanet.com/images/og-preview.png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .Title }} | {{ .Site.Title }}">
    <meta name="twitter:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="twitter:image" content="https://w3datanet.com/images/og-preview.png">
</head>
<script src="/js/nav.js"></script>
<body>

<header class="site-header">
    <div class="container">

        <div class="header-flex">
            <h1 class="site-title">
                <a href="{{ "/" | relURL }}">
                    <img src="{{ "images/logo.png" | relURL }}" alt="W3DataNet">
                </a>
            </h1>

            <button class="nav-toggle" aria-label="Toggle Menu">
                ☰
            </button>

           <nav class="site-nav">
              {{ $p := .RelPermalink }}
              {{ range .Site.Menus.main }}
                {{ $u := .URL }}
                {{ $active := or (eq $p $u) (and (ne $u "/") (hasPrefix $p $u)) }}
                <a href="{{ $u }}" class="{{ if $active }}active{{ end }}">{{ .Name }}</a>
              {{ end }}
            </nav>
        </div>

    </div>
</header>

    <main class="site-content">
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© {{ now.Year }} W3DataNet</p>
        </div>
    </footer>

</body>
</html>
