<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/style.css?v={{ now.Unix }}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "@id": "https://w3datanet.com/#person",
      "name": "Dr. B. M. Riazul Islam",
      "url": "https://w3datanet.com/",
      "image": "https://w3datanet.com/images/profile.jpg",
      "jobTitle": "Physician & Digital Health Systems Architect",
      "sameAs": [
        "https://linkedin.com/in/riazsomc44",
        "https://github.com/riazsomc"
      ],
      "knowsAbout": [
        "Digital Health",
        "Health Information Systems",
        "Health Data Interoperability",
        "ICD-11 Implementation",
        "AI Architecture",
        "Retrieval-Augmented Generation",
        "Information Architecture",
        "Secure Infrastructure",
        "Health Data Governance"
      ]
    }
    </script>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="author" content="{{ .Site.Params.author }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ .Site.Params.description }}">
    <meta property="og:type" content="website">
</head>
<script src="/js/nav.js"></script>
<body>

<header class="site-header">
    <div class="container">

        <div class="header-flex">
            <h1 class="site-title">
                <a href="{{ "/" | relURL }}">
                    <img src="{{ "images/logo.png" | relURL }}" alt="W3DataNet">
                </a>
            </h1>

            <button class="nav-toggle" aria-label="Toggle Menu">
                ☰
            </button>

           <nav class="site-nav">
              {{ $p := .RelPermalink }}
              {{ range .Site.Menus.main }}
                {{ $u := .URL }}
                {{ $active := or (eq $p $u) (and (ne $u "/") (hasPrefix $p $u)) }}
                <a href="{{ $u }}" class="{{ if $active }}active{{ end }}">{{ .Name }}</a>
              {{ end }}
            </nav>
        </div>

    </div>
</header>

    <main class="site-content">
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© {{ now.Year }} W3DataNet</p>
        </div>
    </footer>

</body>
</html>
